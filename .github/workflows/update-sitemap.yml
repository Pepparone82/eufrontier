name: Update Sitemap

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch sitemap from Edge Function
        run: |
          curl -s https://xoqrmeumjivdxxpkyvny.supabase.co/functions/v1/sitemap \
            -o public/sitemap.xml

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git diff --cached --quiet || git commit -m "chore: update sitemap [skip ci]"
          git push
